<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>iTask Manager</title>
</head>

<body> 

    <h1> 
        iTask Manager
    </h1>

    <div> 
        <button id="botao-adicionar-tarefa">+</button>
    </div>

    <div class="container escondido" id="formulario">

        <div class="linha-formulario">
            <div>
                <h3>Tarefa:</h3>
                <input type="text" id="input-nome" placeholder="Digite a tarefa:">
            </div>

            <div>
                <h3>Descrição:</h3>
                <textarea id="input-descricao" placeholder="Digite a descricao:"></textarea>
            </div>
        </div>

        <button id="botao-concluir-tarefa">Adicionar</button>

    </div>


    <h2><ul id="lista">Lista de Tarefas </ul></h2>

</body>
